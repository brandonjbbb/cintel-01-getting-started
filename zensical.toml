# ============================================================
# zensical.toml (Zensical configuration file)
# ============================================================

[project]
site_name = "Continuous Intelligence"
site_url = "https://brandonjbbb.github.io/cintel-01-getting-started/"
repo_url = "https://github.com/brandonjbbb/cintel-01-getting-started"
repo_name = "brandonjbbb/cintel-01-getting-started"
site_description = "Continuous Intelligence project documentation"
docs_dir = "docs"
site_dir = "site"
edit_uri = "edit/main/docs/"

[project.extra]
social = [
    { icon = "fontawesome/brands/github", link = "https://github.com/brandonjbbb/cintel-01-getting-started" },
]

[project.plugins.search]
lang = "en"

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
show_source = true
show_root_heading = true
show_root_toc_entry = true
show_signature_annotations = true
separate_signature = true

[project.theme]
features = [
    "navigation.tracking",
    "navigation.expand",
    "navigation.path",
    "navigation.prune",
    "navigation.indexes",
    "toc.follow",
    "toc.integrate",
    "navigation.top",
]

nav = [
    { "Home" = "index.md" },
    { "Project Instructions" = "project-instructions.md" },
    { "Your Files" = "your-files.md" },
    { "Glossary" = "glossary.md" },
]
